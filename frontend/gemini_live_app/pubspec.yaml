name: vision_aid_app
description: Vision Aid App using Gemini Live API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_ai: ^2.2.0
  firebase_core: ^3.10.1
  flutter_riverpod: ^2.6.1
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  flutter_animate: ^4.5.0
  image: ^4.2.0
  firebase_auth: ^5.5.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  tflite_flutter: ^0.12.1
  flutter_tts: ^4.0.2
  firebase_database: ^11.3.10
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  speech_to_text: ^7.3.0
  google_maps_flutter: ^2.14.0
  socket_io_client: ^3.1.4
  html: ^0.15.6
  flutter_dotenv: ^6.0.1
  volume_controller: ^3.4.4
  flutter_polyline_points: ^3.1.0
  google_mlkit_face_detection: ^0.13.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/yolov8n.tflite
    - assets/models/yolov8n.txt
    - assets/models/mobilefacenet.tflite