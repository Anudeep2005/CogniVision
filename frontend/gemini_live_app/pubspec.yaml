name: vision_aid_app
description: Vision Aid App using Gemini Live API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_ai: ^2.2.0
  firebase_core: ^3.10.1
  flutter_riverpod: ^2.6.1
  record: ^6.0.0
  flutter_soloud: ^3.2.2
  camera: ^0.11.0+2
  flutter_animate: ^4.5.0
  image: ^4.2.0
  firebase_auth: ^5.5.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  tflite_flutter: ^0.12.1
  flutter_tts: ^4.0.2
  web_socket_channel: ^3.0.1
  # Integrated from Camera_detection-main
  google_mlkit_face_detection: ^0.10.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  # Integrated from CogniVision-Ruthik
  google_maps_flutter: ^2.14.0
  socket_io_client: ^3.1.4
  geolocator: ^14.0.2
  speech_to_text: ^7.3.0
  html: ^0.15.6
  flutter_dotenv: ^6.0.1
  flutter_polyline_points: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/yolov8n.tflite
    - assets/models/yolov8n.txt
    - .env

dependency_overrides:
  google_maps_flutter_android: 2.18.3